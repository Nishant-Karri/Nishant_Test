# ============================================================
# DRE — Per-Job Pipeline Configuration
# New Glue jobs are auto-discovered. Add a matching entry here
# for custom SLA, freshness, and table config. Jobs without an
# entry fall back to the defaults section.
# ============================================================

settings:
  poll_interval_seconds: 60
  freshness_check_interval_seconds: 300
  drift_check_interval_seconds: 3600
  alert_email: itsnishant56@gmail.com

defaults:
  sla_runtime_minutes: 60
  row_count_deviation_pct: 20
  freshness_key_column: DATE
  freshness_max_delay_minutes: 120

jobs:
  - name: nishant-test-nonprod-json-to-parquet
    glue_job_name: nishant-test-nonprod-json-to-parquet
    sla_runtime_minutes: 30
    freshness:
      key_column: DATE
      max_delay_minutes: 60
    row_count:
      deviation_threshold_pct: 20
    target_tables:
      - name: nishant_test_nonprod_db.json_to_parquet_iceberg
        primary_key: id
        not_null_columns: [id, DATE]
        numeric_columns: []
        categorical_columns: {}
      - name: nishant_test_nonprod_db.json_to_parquet
        primary_key: id
        not_null_columns: [id, DATE]
        numeric_columns: []
        categorical_columns: {}
